<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>体感魔法棒 - 俯仰角控制小鸟 002</title>
    <style>
        body { margin: 0; background-color: #2c3e50; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        canvas { background-color: #71c5cf; border: 4px solid #fff; border-radius: 10px; margin-top: 20px; }
        #info { margin: 10px; font-size: 18px; color: #2ecc71; }
    </style>
</head>
<body>
    <h2>🪄 倾斜魔法棒控制高度</h2>
    <div id="info">等待蓝牙手柄连接... (可用鼠标上下移动测试)</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let birdY = 250;
        let score = 0;
        let pipes = [];
        let frames = 0;
        let gameOver = false;

        // --- 降低难度参数 ---
        const pipeGap = 180; // 空间加大 (原130)
        const pipeInterval = 120; // 柱子生成的间距加大 (原100)
        const gameSpeed = 1.5; // 速度变慢 (原2)

        function update() {
            if (gameOver) return;
            frames++;

            // 读取手柄轴 (Axis 1 通常是纵向摇杆)
            const gamepads = navigator.getGamepads();
            if (gamepads[0]) {
                const axisValue = gamepads[0].axes[1]; // 取值 -1 (最上) 到 1 (最下)
                // 将 -1 ~ 1 映射到画布的 50 ~ 450 像素高度
                birdY = ((axisValue + 1) / 2) * (canvas.height - 100) + 50;
                info.innerText = "🟢 魔法棒已连接 | 俯仰数值: " + axisValue.toFixed(2);
            }

            // 生成管道
            if (frames % pipeInterval === 0) {
                let top = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({ x: canvas.width, top: top });
            }

            // 移动管道
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= gameSpeed;
                
                // 碰撞检测
                if (50 + 15 > pipes[i].x && 50 - 15 < pipes[i].x + 50) {
                    if (birdY - 15 < pipes[i].top || birdY + 15 > pipes[i].top + pipeGap) {
                        gameOver = true;
                    }
                }

                if (pipes[i].x === 50) score++;
                if (pipes[i].x < -50) pipes.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 画小鸟
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(50, birdY, 15, 0, Math.PI*2); ctx.fill();
            
            // 画管道
            ctx.fillStyle = '#2ecc71';
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, 50, p.top); // 上
                ctx.fillRect(p.x, p.top + pipeGap, 50, canvas.height); // 下
            });

            ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.fillText(score, 20, 50);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,400,500);
                ctx.fillStyle = 'white'; ctx.fillText("游戏结束", 140, 250);
                ctx.font = '20px Arial'; ctx.fillText("点击画面重启", 145, 290);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 鼠标模拟测试
        canvas.addEventListener('mousemove', (e) => {
            if (!navigator.getGamepads()[0]) birdY = e.offsetY;
        });
        canvas.addEventListener('click', () => { if(gameOver) location.reload(); });

        gameLoop();
    </script>
</body>
</html>
