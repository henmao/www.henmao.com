<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>体感魔法棒 - 俯仰角控制小鸟</title>
    <style>
        body { margin: 0; background-color: #2c3e50; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        canvas { background-color: #71c5cf; border: 4px solid #fff; border-radius: 10px; margin-top: 20px; }
        #info { margin: 10px; font-size: 18px; color: #2ecc71; }

        /* 调试面板，按 D 键切换显示 */
        #debug { display: none; margin: 6px; font-size: 14px; color: #95a5a6; }
        #debug .axis-label { margin-bottom: 4px; }
        #debug .bar-container { width: 300px; height: 14px; background: #34495e; border-radius: 7px; position: relative; margin-bottom: 8px; }
        #debug .bar-center { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #7f8c8d; }
        #debug .bar-fill { position: absolute; top: 0; height: 100%; border-radius: 7px; }
    </style>
</head>
<body>
    <h2>🪄 倾斜魔法棒控制高度</h2>
    <div id="info">等待蓝牙手柄连接...</div>

    <div id="debug">
        <div class="axis-label">A0 Roll: <span id="a0-val">--</span></div>
        <div class="bar-container"><div class="bar-center"></div><div class="bar-fill" id="a0-bar"></div></div>
        <div class="axis-label">A1 Pitch: <span id="a1-val">--</span></div>
        <div class="bar-container"><div class="bar-center"></div><div class="bar-fill" id="a1-bar"></div></div>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');
        const debugPanel = document.getElementById('debug');

        let birdY = 250;
        let birdVelocity = 0;
        let smoothedAxis = 0;
        let score = 0;
        let pipes = [];
        let frames = 0;
        let gameOver = false;

        const pipeGap = 180;
        const pipeInterval = 120;
        const gameSpeed = 1.5;
        const baseGravity = 0.12;

        // 按 D 键切换调试面板
        document.addEventListener('keydown', (e) => {
            if (e.key === 'd' || e.key === 'D') {
                debugPanel.style.display = debugPanel.style.display === 'none' ? 'block' : 'none';
            }
        });

        function updateDebugBar(barEl, valEl, v) {
            const color = v >= 0 ? '#2ecc71' : '#e74c3c';
            valEl.innerText = v.toFixed(3);
            barEl.style.background = color;
            if (v >= 0) { barEl.style.left = '50%'; barEl.style.width = (v * 50) + '%'; }
            else { barEl.style.left = ((0.5 + v * 0.5) * 100) + '%'; barEl.style.width = (-v * 50) + '%'; }
        }

        function update() {
            if (gameOver) return;
            frames++;

            const gamepads = navigator.getGamepads();
            if (gamepads[0]) {
                const axisValue = gamepads[0].axes[1]; // A1 = pitch
                smoothedAxis += (axisValue - smoothedAxis) * 0.15;

                // 升力对抗重力，悬停点约在 axisValue ≈ 0.13
                birdVelocity += baseGravity - smoothedAxis * 0.9;
                info.innerText = '🟢 魔法棒已连接';

                // 调试面板
                updateDebugBar(document.getElementById('a0-bar'), document.getElementById('a0-val'), gamepads[0].axes[0]);
                updateDebugBar(document.getElementById('a1-bar'), document.getElementById('a1-val'), axisValue);
            } else {
                birdVelocity += baseGravity;
            }

            birdVelocity *= 0.90;
            birdY += birdVelocity;
            if (birdY < 15) { birdY = 15; birdVelocity = 0; }
            if (birdY > canvas.height - 15) { birdY = canvas.height - 15; birdVelocity = 0; }

            if (frames % pipeInterval === 0) {
                let top = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({ x: canvas.width, top: top });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= gameSpeed;
                if (50 + 15 > pipes[i].x && 50 - 15 < pipes[i].x + 50) {
                    if (birdY - 15 < pipes[i].top || birdY + 15 > pipes[i].top + pipeGap) {
                        gameOver = true;
                    }
                }
                if (pipes[i].x === 50) score++;
                if (pipes[i].x < -50) pipes.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 小鸟
            const bx = 50, by = birdY;
            const tilt = Math.max(-0.6, Math.min(0.6, birdVelocity * 0.08));
            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate(tilt);

            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.ellipse(0, 0, 16, 12, 0, 0, Math.PI * 2); ctx.fill();

            const wingFlap = Math.sin(frames * 0.3) * 5;
            ctx.fillStyle = '#e67e22';
            ctx.beginPath(); ctx.ellipse(-3, -8 + wingFlap, 10, 5, -0.4, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#e67e22';
            ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-22, -6); ctx.lineTo(-22, 6); ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.moveTo(14, -2); ctx.lineTo(22, 0); ctx.lineTo(14, 3); ctx.closePath(); ctx.fill();

            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(8, -4, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath(); ctx.arc(9, -4, 2, 0, Math.PI * 2); ctx.fill();

            ctx.restore();

            // 管道
            ctx.fillStyle = '#2ecc71';
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, 50, p.top);
                ctx.fillRect(p.x, p.top + pipeGap, 50, canvas.height);
            });

            ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.fillText(score, 20, 50);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, 400, 500);
                ctx.fillStyle = 'white'; ctx.fillText('游戏结束', 140, 250);
                ctx.font = '20px Arial'; ctx.fillText('点击画面重启', 145, 290);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        canvas.addEventListener('mousemove', (e) => { if (!navigator.getGamepads()[0]) birdY = e.offsetY; });
        canvas.addEventListener('click', () => { if (gameOver) location.reload(); });

        gameLoop();
    </script>
</body>
</html>
