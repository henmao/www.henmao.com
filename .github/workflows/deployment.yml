name: auto-publish
on: [push]
jobs:
  scp-to-cloud-tencent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: deploy file to server
        uses: appleboy/scp-action@master
        with: 
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          KEY: ${{ secrets.KEY }}
          source: "./dist/*"
          target: "/home/ubuntu/docker-henmao/www/nginx/www.henmao.com"
          strip_components: 1
          rm: true
